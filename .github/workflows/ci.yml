name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install system dependencies for native builds
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libvips-dev libsqlite3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck (src)
        run: npx tsc --noEmit

      - name: TypeScript typecheck (scripts)
        run: npx tsc --project tsconfig.scripts.json

      - name: TypeScript build
        run: npx tsc

      - name: Verify dist/ output
        run: |
          test -f dist/index.js || (echo "dist/index.js missing" && exit 1)
          test -f dist/tools/printer.js || (echo "dist/tools/printer.js missing" && exit 1)
          echo "✅ Build artifacts verified"

      - name: Show build size
        run: |
          echo "=== dist/ contents ==="
          find dist -type f -name "*.js" -exec wc -c {} + | tail -1
          echo ""
          echo "=== node_modules size (informational) ==="
          du -sh node_modules/

  cross-platform-build:
    name: ARM64 cross-build sanity check
    runs-on: ubuntu-latest
    # ARM64 native build確認(Pi Zero 2 W環境と同じアーキテクチャ)
    # QEMUでARM64コンテナを起動してnpm installとbuildのみ検証
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run ARM64 build in Docker
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            node:20-bookworm-slim \
            bash -c "
              apt-get update && \
              apt-get install -y build-essential python3 libvips-dev libsqlite3-dev && \
              npm ci && \
              npx tsc --noEmit && \
              echo '✅ ARM64 build passed'
            "
